<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>aZon Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fff;
        }

        .auth-container {
            max-width: 350px;
            margin: 0 auto;
        }

        .auth-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 25px;
        }
    </style>
</head>

<body>
    <div class="container mt-4 mb-5 auth-container">
        <div class="text-center mb-3">
            <a th:href="@{/}" class="text-dark text-decoration-none fw-bold fs-2"><i class="bi bi-shop"></i>
                OrganicWorld</a>
        </div>

        <div class="auth-card shadow-sm mb-4">
            <h2 class="fw-normal mb-3">Sign in</h2>

            <div th:if="${param.error}" class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-triangle text-danger me-2"></i>There was a problem.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2 small">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold small mb-1">Email or mobile phone number</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label for="password" class="form-label fw-bold small mb-0">Password</label>
                        <a href="#" class="amz-link small text-decoration-none">Forgot Password</a>
                    </div>
                    <input type="password" class="form-control mt-1" id="password" name="password" required>
                </div>

                <button type="submit" class="btn amz-btn-primary w-100 rounded py-1 mb-3 shadow-sm">Continue</button>

                <p class="small text-muted mb-4" style="font-size: 11px;">
                    By continuing, you agree to aZon's <a href="#" class="amz-link">Conditions of Use</a> and <a
                        href="#" class="amz-link">Privacy Notice</a>.
                </p>

                <div class="dropdown-divider"></div>
                <div class="mt-3">
                    <a href="#" class="amz-link small fw-bold text-decoration-none"><i
                            class="bi bi-caret-right-fill text-muted" style="font-size: 10px;"></i> Need help?</a>
                </div>
            </form>
        </div>

        <div class="text-center position-relative mb-3">
            <hr>
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 small text-muted">New to
                aZon?</span>
        </div>

        <a th:href="@{/register}" class="btn border w-100 rounded shadow-sm bg-light py-1">Create your account</a>

        <footer class="text-center py-4 mt-5" style="border-top: 2px solid #eee; font-size: 11px; color: #555;">
            <div class="mb-2 d-flex justify-content-center gap-4">
                <a href="#" class="amz-link text-decoration-none">Conditions of Use</a>
                <a href="#" class="amz-link text-decoration-none">Privacy Notice</a>
                <a href="#" class="amz-link text-decoration-none">Help</a>
            </div>
            <div>© 2026, OrganicWorld.com, Inc. or its affiliates</div>
        </footer>
    </div>
</body>

</html>
