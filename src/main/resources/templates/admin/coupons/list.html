<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Coupons | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #2874f0;
            --primary-light: rgba(40, 116, 240, 0.08);
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.08);
            --warning: #f59e0b;
            --warning-light: rgba(245, 158, 11, 0.08);
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.08);
            --dark: #0f172a;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            overflow-x: hidden;
        }
        .dashboard-container { display: flex; min-height: 100vh; }
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            background-color: #f8fafc;
            min-height: 100vh;
        }
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }
        .glass-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.02);
        }
        .form-label-custom {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 6px;
        }
        .modern-badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
        .badge-warning { background: var(--warning-light); color: var(--warning); }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div th:replace="~{fragments/admin_sidebar :: sidebar('coupons')}"></div>
    <main class="main-content">
        <header class="top-header">
            <div>
                <h1 class="fw-extrabold text-dark m-0 fs-3" style="font-weight: 800; letter-spacing: -0.5px;">Coupons</h1>
                <p class="text-muted small m-0">Create and manage promotional discount coupons.</p>
            </div>
            <div class="bg-white p-2 px-3 rounded-pill border d-flex align-items-center gap-2">
                <span class="fw-bold text-dark small" th:text="${#authentication.principal.fullName}">Admin</span>
                <div class="bg-primary text-white" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;">
                    <i class="bi bi-person-fill-lock"></i>
                </div>
            </div>
        </header>

        <div class="row g-4">
            <!-- Create Coupon -->
            <div class="col-lg-4">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-ticket-perforated text-primary me-2"></i>Create Coupon</h5>
                    <form th:action="@{/admin/coupons/save}" method="POST" th:object="${newCoupon}" class="d-flex flex-column gap-3">
                        <div>
                            <label class="form-label-custom">Coupon Code</label>
                            <input type="text" th:field="*{code}" class="form-control" placeholder="e.g. SAVE20" required>
                        </div>
                        <div>
                            <label class="form-label-custom">Description</label>
                            <input type="text" th:field="*{description}" class="form-control" placeholder="e.g. 20% off on all items">
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label-custom">Discount Type</label>
                                <select th:field="*{discountType}" class="form-select">
                                    <option value="PERCENTAGE">Percentage</option>
                                    <option value="FLAT">Flat</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label-custom">Value</label>
                                <input type="number" step="0.01" th:field="*{discountValue}" class="form-control" placeholder="20" required>
                            </div>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label-custom">Min Order</label>
                                <input type="number" step="0.01" th:field="*{minOrderAmount}" class="form-control" placeholder="499">
                            </div>
                            <div class="col-6">
                                <label class="form-label-custom">Max Discount</label>
                                <input type="number" step="0.01" th:field="*{maxDiscount}" class="form-control" placeholder="200">
                            </div>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label-custom">Valid From</label>
                                <input type="date" th:field="*{validFrom}" class="form-control">
                            </div>
                            <div class="col-6">
                                <label class="form-label-custom">Valid Until</label>
                                <input type="date" th:field="*{validUntil}" class="form-control">
                            </div>
                        </div>
                        <div>
                            <label class="form-label-custom">Usage Limit</label>
                            <input type="number" th:field="*{usageLimit}" class="form-control" placeholder="100">
                        </div>
                        <div>
                            <label class="form-label-custom">Applicable Products</label>
                            <select name="selectedProductIds" class="form-select" multiple size="4">
                                <option th:each="p : ${allProducts}" th:value="${p.id}" th:text="${p.name}">Product</option>
                            </select>
                            <span class="text-muted small d-block mt-1">Leave empty to apply to entire order. Ctrl+click to select multiple.</span>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold mt-2">
                            <i class="bi bi-plus-lg me-1"></i> Create Coupon
                        </button>
                    </form>
                </div>
            </div>

            <!-- Coupon List -->
            <div class="col-lg-8">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-ticket-perforated text-primary me-2"></i>All Coupons</h5>
                    <div class="table-responsive">
                        <table class="table table-borderless align-middle">
                            <thead>
                                <tr class="border-bottom">
                                    <th class="text-muted small fw-bold">Code</th>
                                    <th class="text-muted small fw-bold">Discount</th>
                                    <th class="text-muted small fw-bold">Min Order</th>
                                    <th class="text-muted small fw-bold">Usage</th>
                                    <th class="text-muted small fw-bold">Status</th>
                                    <th class="text-muted small fw-bold text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="coupon : ${coupons}" class="border-bottom">
                                    <td>
                                        <strong class="text-dark" th:text="${coupon.code}">SAVE20</strong>
                                        <span class="d-block text-muted small" th:text="${coupon.description}">Description</span>
                                    </td>
                                    <td>
                                        <span th:text="${coupon.discountType == 'PERCENTAGE' ? coupon.discountValue + '%' : '₹' + coupon.discountValue}">20%</span>
                                    </td>
                                    <td>
                                        <span th:text="${coupon.minOrderAmount != null ? '₹' + coupon.minOrderAmount : '—'}">₹499</span>
                                    </td>
                                    <td>
                                        <span th:text="${coupon.usedCount != null ? coupon.usedCount : 0} + '/' + ${coupon.usageLimit != null ? coupon.usageLimit : '∞'}">0/100</span>
                                    </td>
                                    <td>
                                        <span th:class="'modern-badge badge-' + ${coupon.active && coupon.isValid() ? 'success' : 'danger'}" th:text="${coupon.active && coupon.isValid() ? 'Active' : 'Inactive'}">Active</span>
                                    </td>
                                    <td class="text-end">
                                        <div class="d-flex align-items-center justify-content-end gap-1">
                                            <form th:action="@{'/admin/coupons/toggle/' + ${coupon.id}}" method="POST" class="m-0">
                                                <button type="submit" th:class="'btn btn-sm py-1.5 px-3 fw-bold rounded-3 ' + ${coupon.active ? 'btn-outline-warning' : 'btn-outline-success'}" th:text="${coupon.active ? 'Disable' : 'Enable'}">Toggle</button>
                                            </form>
                                            <a th:href="@{'/admin/coupons/delete/' + ${coupon.id}}" class="btn btn-outline-danger btn-sm py-1.5 px-2 rounded-3" onclick="return confirm('Delete this coupon?');"><i class="bi bi-trash-fill"></i></a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(coupons)}">
                                    <td colspan="6" class="text-center text-muted py-5">
                                        <i class="bi bi-ticket-perforated fs-2 d-block mb-2"></i>
                                        No coupons created yet.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
