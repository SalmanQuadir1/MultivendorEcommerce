<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${category.id == null ? 'Add Category | OrganicWorld' : 'Edit Category | OrganicWorld'}">Category Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #2874f0;
            --primary-light: rgba(40, 116, 240, 0.08);
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.08);
            --dark: #0f172a;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */


        /* Main Panel */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .glass-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            max-width: 650px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Left Sidebar -->
    <!-- Automated Side-Frame Propagation -->
    <div th:replace="~{fragments/admin_sidebar :: sidebar('categories')}"></div>

    <!-- Main Content Panel -->
    <main class="main-content">
        <!-- Top Header Bar -->
        <header class="top-header">
            <div>
                <h1 class="fw-extrabold text-dark m-0 fs-3" style="font-weight: 800; letter-spacing: -0.5px;" th:text="${category.id == null ? 'Add New Category' : 'Edit Category'}">Category Form</h1>
                <p class="text-muted small m-0">Create/Update categories to group catalog products seamlessly.</p>
            </div>
            
            <div>
                <a th:href="@{/admin/categories}" class="btn btn-outline-secondary fw-bold px-4 rounded-3">Back to List</a>
            </div>
        </header>

        <!-- Category Form Card -->
        <div class="glass-card p-4">
            <form th:action="@{/admin/categories/save}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="mb-4">
                    <label for="name" class="form-label fw-bold text-secondary" style="font-size: 13px;">Category Name</label>
                    <input type="text" class="form-control rounded-3" id="name" th:field="*{name}" placeholder="e.g., Organic Fruits" required style="padding: 12px; font-size: 14px;">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
                </div>
                
                <div class="mb-4">
                    <label for="description" class="form-label fw-bold text-secondary" style="font-size: 13px;">Description</label>
                    <textarea class="form-control rounded-3" id="description" rows="4" th:field="*{description}" placeholder="Provide a brief description of the category..." style="padding: 12px; font-size: 14px;"></textarea>
                </div>
                
                <div class="d-flex justify-content-between pt-2">
                    <a th:href="@{/admin/categories}" class="btn btn-outline-secondary px-4 py-2 fw-bold rounded-3" style="font-size: 14px;">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold rounded-3" style="font-size: 14px;">Save Category</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
