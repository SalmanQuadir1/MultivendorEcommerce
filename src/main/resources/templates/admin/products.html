<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Directory | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #2874f0;
            --primary-light: rgba(40, 116, 240, 0.08);
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.08);
            --warning: #f59e0b;
            --warning-light: rgba(245, 158, 11, 0.08);
            --info: #06b6d4;
            --info-light: rgba(6, 182, 212, 0.08);
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.08);
            --dark: #0f172a;
            --gray-light: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }



        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .user-profile-badge {
            background: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .glass-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table-modern th {
            color: #64748b;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            padding: 12px 20px;
        }

        .table-modern tbody tr {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
            transition: all 0.25s ease;
        }

        .table-modern tbody tr:hover {
            transform: scale(1.005);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .table-modern td {
            padding: 18px 20px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .table-modern td:first-child {
            border-left: 1px solid var(--border-color);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        .table-modern td:last-child {
            border-right: 1px solid var(--border-color);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Modern Left Sidebar -->
    <!-- Modern Sidebar Fragment -->
    <div th:replace="~{fragments/admin_sidebar :: sidebar('products')}"></div>

    <!-- Main Content Panel -->
    <main class="main-content">
        <!-- Top Header Bar -->
        <header class="top-header">
            <div>
                <h1 class="fw-extrabold text-dark m-0 fs-3" style="font-weight: 800; letter-spacing: -0.5px;">Product Directory</h1>
                <p class="text-muted small m-0">Complete catalog of all live products and their details.</p>
            </div>

            <div class="user-profile-badge">
                <div class="text-end">
                    <span class="d-block fw-bold text-dark" style="font-size: 13px;" th:text="${#authentication.principal.fullName}">Administrator</span>
                    <span class="text-muted small" style="font-size: 11px;">Primary Owner</span>
                </div>
                <div class="bg-primary text-white icon-box" style="width: 36px; height: 36px; border-radius: 50%; font-size: 14px;">
                    <i class="bi bi-person-fill-lock"></i>
                </div>
            </div>
        </header>

        <!-- Products Table -->
        <div class="glass-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold text-dark m-0">Live Product Catalog</h5>
                <button class="btn btn-sm btn-outline-success px-3 rounded-3" onclick="exportTableToCSV('#products-tab table', 'products_report.csv')">
                    <i class="bi bi-file-earmark-spreadsheet me-1"></i> Export Products CSV
                </button>
            </div>
            <div class="table-responsive">
                <table class="table-modern" id="products-table">
                    <thead>
                        <tr>
                            <th>Product Details</th>
                            <th>Category</th>
                            <th>Vendor Details</th>
                            <th>Unit Price</th>
                            <th>Inventory stock</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="@{${product.imageUrl != null ? product.imageUrl : '/images/placeholder.png'}}" style="width: 48px; height: 48px; object-fit: contain; border-radius: 8px;" class="border bg-light">
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${product.name}">Product Name</div>
                                        <span class="text-muted small">ID: <span th:text="${product.id}">1</span></span>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-primary" th:text="${product.category.name}">Category</span>
                            </td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${product.vendor.fullName}">Vendor</div>
                                <span class="text-muted small" th:text="${product.vendor.email}">vendor@email.com</span>
                            </td>
                            <td>
                                <div class="fw-bold text-dark">₹<span th:text="${product.price}">0.00</span></div>
                            </td>
                            <td>
                                <ul class="list-unstyled mb-0 small">
                                    <li th:each="v : ${product.variants}">
                                        <span class="text-muted" th:text="'Size: ' + ${v.size}">Size</span>
                                        <span th:class="${v.stock <= 10 ? 'text-danger fw-bold' : 'text-success fw-bold'}" th:text="'(' + ${v.stock} + ' left)'">Stock</span>
                                    </li>
                                </ul>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div th:replace="~{fragments/pagination :: pagination(pagedData=${products}, baseUrl='/admin/products', pageParam='page', sizeParam='size')}"></div>
        </div>
    </main>
</div>

<script>
    function exportTableToCSV(tableSelector, filename = 'report.csv') {
        const table = document.querySelector(tableSelector);
        if (!table) return;
        const rows = Array.from(table.querySelectorAll('tr'));

        let csvContent = "data:text/csv;charset=utf-8,";

        rows.forEach(row => {
            const cols = Array.from(row.querySelectorAll('th, td'));
            const rowData = cols.map(col => {
                let text = col.textContent.replace(/(\r\n|\n|\r)/gm, "").trim();
                text = text.replace(/"/g, '""');
                return `"\${text}"`;
            }).join(",");
            csvContent += rowData + "\\r\\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
