<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Stock | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
<div class="container mt-5 mb-5" style="max-width: 600px;">
    <h2 class="mb-4 fw-bold text-dark">Update Stock for <span th:text="${product.name}"></span></h2>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <div th:each="v : ${product.variants}" class="mb-4 pb-3 border-bottom">
                <form th:action="@{'/admin/inventory/update/' + ${v.id}}" method="post" class="d-flex align-items-end gap-3">
                    <div class="flex-grow-1">
                        <label class="form-label fw-bold text-secondary">Size: <span class="text-primary" th:text="${v.size}"></span></label>
                        <input type="number" class="form-control rounded-3" name="stock" th:value="${v.stock}" min="0" required>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary px-4 rounded-3">Update</button>
                    </div>
                </form>
            </div>

            <div class="d-flex justify-content-start mt-4">
                <a th:href="@{/admin/inventory}" class="btn btn-outline-secondary px-4 rounded-3">Back to List</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
