<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users & Clients | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #2874f0;
            --primary-light: rgba(40, 116, 240, 0.08);
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.08);
            --warning: #f59e0b;
            --warning-light: rgba(245, 158, 11, 0.08);
            --info: #06b6d4;
            --info-light: rgba(6, 182, 212, 0.08);
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.08);
            --dark: #0f172a;
            --gray-light: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }



        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .user-profile-badge {
            background: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .glass-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table-modern th {
            color: #64748b;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            padding: 12px 20px;
        }

        .table-modern tbody tr {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
            transition: all 0.25s ease;
        }

        .table-modern tbody tr:hover {
            transform: scale(1.005);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .table-modern td {
            padding: 18px 20px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .table-modern td:first-child {
            border-left: 1px solid var(--border-color);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        .table-modern td:last-child {
            border-right: 1px solid var(--border-color);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .modern-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge-primary { background: var(--primary-light); color: var(--primary); }
        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-warning { background: var(--warning-light); color: var(--warning); }
        .badge-info { background: var(--info-light); color: var(--info); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Modern Left Sidebar -->
    <!-- Unified Sidebar -->
    <div th:replace="~{fragments/admin_sidebar :: sidebar('users')}"></div>

    <!-- Main Content Panel -->
    <main class="main-content">
        <!-- Top Header Bar -->
        <header class="top-header">
            <div>
                <h1 class="fw-extrabold text-dark m-0 fs-3" style="font-weight: 800; letter-spacing: -0.5px;">Users & Clients</h1>
                <p class="text-muted small m-0">Manage user accounts, roles, and client information.</p>
            </div>

            <div class="user-profile-badge">
                <div class="text-end">
                    <span class="d-block fw-bold text-dark" style="font-size: 13px;" th:text="${#authentication.principal.fullName}">Administrator</span>
                    <span class="text-muted small" style="font-size: 11px;">Primary Owner</span>
                </div>
                <div class="bg-primary text-white icon-box" style="width: 36px; height: 36px; border-radius: 50%; font-size: 14px;">
                    <i class="bi bi-person-fill-lock"></i>
                </div>
            </div>
        </header>

        <!-- Users Table -->
        <div class="glass-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold text-dark m-0">User Directory</h5>
                <button class="btn btn-sm btn-outline-success px-3 rounded-3" onclick="exportTableToCSV('#users-table', 'users_report.csv')">
                    <i class="bi bi-file-earmark-spreadsheet me-1"></i> Export Users CSV
                </button>
            </div>
            <div class="table-responsive">
                <table class="table-modern" id="users-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Full Name</th>
                            <th>Email Address</th>
                            <th>User Roles</th>
                            <th>Account Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td><strong th:text="${'#USR-' + user.id}">#USR-1</strong></td>
                            <td class="fw-bold text-dark" th:text="${user.fullName}">Name</td>
                            <td th:text="${user.email}">user@email.com</td>
                            <td>
                                <span th:each="role : ${user.roles}" th:class="'modern-badge badge-' + ${role.name == 'ROLE_ADMIN' ? 'danger' : (role.name == 'ROLE_VENDOR' ? 'info' : 'secondary')} + ' me-1'" th:text="${role.name}">ROLE</span>
                            </td>
                            <td>
                                <span th:class="'modern-badge badge-' + ${user.enabled ? 'success' : 'danger'}" th:text="${user.enabled ? 'ACTIVE' : 'SUSPENDED'}">ACTIVE</span>
                            </td>
                            <td class="text-end">
                                <form th:action="@{'/admin/users/toggle/' + ${user.id}}" method="POST" class="m-0 d-inline">
                                    <button type="submit" th:class="'btn btn-sm px-3 rounded-3 ' + ${user.enabled ? 'btn-outline-danger' : 'btn-outline-success'}" th:text="${user.enabled ? 'Suspend' : 'Activate'}">Toggle</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div th:replace="~{fragments/pagination :: pagination(pagedData=${users}, baseUrl='/admin/users', pageParam='page', sizeParam='size')}"></div>
        </div>
    </main>
</div>

<script>
    function exportTableToCSV(tableSelector, filename = 'report.csv') {
        const table = document.querySelector(tableSelector);
        if (!table) return;
        const rows = Array.from(table.querySelectorAll('tr'));

        let csvContent = "data:text/csv;charset=utf-8,";

        rows.forEach(row => {
            const cols = Array.from(row.querySelectorAll('th, td'));
            const rowData = cols.map(col => {
                let text = col.textContent.replace(/(\r\n|\n|\r)/gm, "").trim();
                text = text.replace(/"/g, '""');
                return `"\${text}"`;
            }).join(",");
            csvContent += rowData + "\\r\\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
