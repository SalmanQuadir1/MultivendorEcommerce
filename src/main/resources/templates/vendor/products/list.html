<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Products | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #15803d;
            --primary-light: rgba(21, 128, 61, 0.08);
            --success: #166534;
            --success-light: rgba(22, 101, 52, 0.08);
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.08);
            --dark: #14532d;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--dark);
            color: #fff;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-brand {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .sidebar-brand span { color: #ffe500; }

        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 12px;
        }

        .sidebar-nav {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.25s ease;
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.08);
        }

        /* Main Panel */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .glass-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        /* Table */
        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table-modern th {
            color: #64748b;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            padding: 12px 20px;
        }

        .table-modern tbody tr {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
            transition: all 0.25s ease;
        }

        .table-modern tbody tr:hover {
            transform: scale(1.005);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .table-modern td {
            padding: 18px 20px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .table-modern td:first-child {
            border-left: 1px solid var(--border-color);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        .table-modern td:last-child {
            border-right: 1px solid var(--border-color);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .modern-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge-primary { background: var(--primary-light); color: var(--primary); }
        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Left Sidebar -->
    <div th:replace="~{fragments/vendor_sidebar :: sidebar('products')}"></div>

    <!-- Main Content Panel -->
    <main class="main-content">
        <!-- Top Header Bar -->
        <header class="top-header">
            <div>
                <h1 class="fw-extrabold text-dark m-0 fs-3" style="font-weight: 800; letter-spacing: -0.5px;">My Listed Products</h1>
                <p class="text-muted small m-0">Monitor catalog items, prices, and stock allocations.</p>
            </div>
            
            <div>
                <a th:href="@{/vendor/products/new}" class="btn btn-primary fw-bold px-4 rounded-3"><i class="bi bi-plus-lg me-1"></i> Add New Product</a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success rounded-3 mb-4" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger rounded-3 mb-4" th:text="${error}"></div>

        <!-- Product List Card -->
        <div class="glass-card p-4">
            <div class="row g-3 mb-4 align-items-center">
                <div class="col-md-4">
                    <h5 class="fw-bold text-dark m-0">Catalog Products</h5>
                </div>
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 8px 0 0 8px;"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control bg-light border-start-0" placeholder="Search products by name, ID, or category..." style="border-radius: 0 8px 8px 0; box-shadow: none; font-size: 14px;" onkeyup="filterProductsTable()">
                    </div>
                </div>
                <div class="col-md-3 text-end">
                    <button class="btn btn-outline-success btn-sm px-3 rounded-pill fw-bold" onclick="exportTableToCSV('.table-modern', 'vendor_products.csv')">
                        <i class="bi bi-file-earmark-spreadsheet me-1"></i> Export CSV
                    </button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>Product Details</th>
                            <th>Category</th>
                            <th>Unit Price</th>
                            <th>Stock Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="@{${product.imageUrl != null ? product.imageUrl : '/images/placeholder.png'}}" style="width: 48px; height: 48px; object-fit: contain; border-radius: 8px;" class="border bg-light">
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${product.name}">Product Name</div>
                                        <span class="text-muted small">ID: <span th:text="${product.id}">1</span></span>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="modern-badge badge-primary fw-bold" th:text="${product.category.name}">Category</span>
                            </td>
                            <td>
                                <div class="fw-bold text-dark" th:text="'₹' + ${product.price}">0.00</div>
                            </td>
                            <td>
                                <span th:with="totalStock=${#lists.isEmpty(product.variants) ? 0 : #aggregates.sum(product.variants.![stock])}"
                                      th:class="'modern-badge badge-' + ${totalStock > 0 ? 'success' : 'danger'}" 
                                      th:text="${totalStock + ' units'}">Stock</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{'/vendor/products/edit/' + ${product.id}}" class="btn btn-outline-secondary btn-sm px-3 rounded-3 me-1">Edit</a>
                                <a th:href="@{'/vendor/products/delete/' + ${product.id}}" class="btn btn-outline-danger btn-sm px-3 rounded-3" onclick="return confirm('Delete this product?');">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${products.empty}" class="no-products-row">
                            <td colspan="5" class="text-center py-4 text-muted">You haven't listed any products yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div th:replace="~{fragments/pagination :: pagination(pagedData=${products}, baseUrl='/vendor/products', pageParam='page', sizeParam='size')}"></div>
        </div>
    </main>
</div>

<script>
    function filterProductsTable() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const rows = document.querySelectorAll('.table-modern tbody tr:not(.no-products-row)');
        let visibleCount = 0;
        
        rows.forEach(row => {
            const productName = row.querySelector('.fw-bold.text-dark').textContent.toLowerCase();
            const productId = row.querySelector('.text-muted.small').textContent.toLowerCase();
            const category = row.querySelector('.modern-badge.badge-primary').textContent.toLowerCase();
            
            if (productName.includes(query) || productId.includes(query) || category.includes(query)) {
                row.style.display = '';
                visibleCount++;
            } else {
                row.style.display = 'none';
            }
        });
        
        // Show empty message if no rows match
        let emptyRow = document.getElementById('noMatchingRow');
        if (visibleCount === 0) {
            if (!emptyRow) {
                const tbody = document.querySelector('.table-modern tbody');
                const tr = document.createElement('tr');
                tr.id = 'noMatchingRow';
                tr.innerHTML = '<td colspan="5" class="text-center py-4 text-muted"><i class="bi bi-search me-1"></i> No matching products found.</td>';
                tbody.appendChild(tr);
            } else {
                emptyRow.style.display = '';
            }
        } else if (emptyRow) {
            emptyRow.style.display = 'none';
        }
    }

    function exportTableToCSV(tableSelector, filename = 'report.csv') {
        const table = document.querySelector(tableSelector);
        if (!table) return;
        const rows = Array.from(table.querySelectorAll('tr'));

        let csvContent = "data:text/csv;charset=utf-8,";

        rows.forEach(row => {
            // Only export visible rows (ignore hidden or search-no-match rows)
            if (row.style.display === 'none' || row.id === 'noMatchingRow') return;
            const cols = Array.from(row.querySelectorAll('th, td'));
            const rowData = cols.map(col => {
                let text = col.textContent.replace(/(\r\n|\n|\r)/gm, "").trim();
                text = text.replace(/"/g, '""');
                return '"' + text + '"';
            }).join(",");
            csvContent += rowData + "\r\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
