<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5 mb-5" style="max-width: 800px;">
        <h2 class="mb-4" th:text="${product.id == null ? 'Add New Product' : 'Edit Product'}">Product Form</h2>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/vendor/products/save}" th:object="${product}" method="post"
                    enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{imageUrl}">

                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Product Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}"
                                    th:errors="*{name}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Description</label>
                                <textarea class="form-control" id="description" rows="4" th:field="*{description}"
                                    required></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}"
                                    th:errors="*{description}"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="price" class="form-label fw-bold">Price (₹)</label>
                                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}"
                                        required>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}"
                                        th:errors="*{price}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="category" class="form-label fw-bold">Category</label>
                                    <select class="form-select" id="category" name="category.id" required>
                                        <option value="">Select a Category</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                            th:selected="${product.category != null and product.category.id == cat.id}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <!-- Product Variants Section -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Product Sizes & Inventory (SKUs)</label>
                                <div id="variants-container">
                                    <!-- Existing variants (if editing) -->
                                    <div th:each="variant : ${product.variants}"
                                        class="row g-2 mb-2 variant-row align-items-center">
                                        <div class="col-md-4">
                                            <input type="text" name="variantSizes" th:value="${variant.size}"
                                                class="form-control" placeholder="Size (e.g. S, M)" required>
                                        </div>
                                        <div class="col-md-4">
                                            <input type="number" name="variantStocks" th:value="${variant.stock}"
                                                class="form-control" placeholder="Stock" required>
                                        </div>
                                        <div class="col-md-2">
                                            <input type="number" step="0.01" name="variantPrices"
                                                th:value="${variant.price}" class="form-control" placeholder="Price (₹)"
                                                required>
                                        </div>
                                        <div class="col-md-2">
                                            <button type="button"
                                                class="btn btn-outline-danger remove-variant-btn w-100"><i
                                                    class="bi bi-trash">Delete</i></button>
                                        </div>
                                    </div>
                                    <!-- If new product, add at least one row -->
                                    <div th:if="${#lists.isEmpty(product.variants)}"
                                        class="row g-2 mb-2 variant-row align-items-center">
                                        <div class="col-md-4">
                                            <input type="text" name="variantSizes" class="form-control"
                                                placeholder="Size (e.g. S, M)" required>
                                        </div>
                                        <div class="col-md-4">
                                            <input type="number" name="variantStocks" class="form-control"
                                                placeholder="Stock" required>
                                        </div>
                                        <div class="col-md-2">
                                            <input type="number" step="0.01" name="variantPrices" class="form-control"
                                                placeholder="Price (₹)" required>
                                        </div>
                                        <div class="col-md-2">
                                            <button type="button"
                                                class="btn btn-outline-danger remove-variant-btn w-100"><i
                                                    class="bi bi-trash">Delete</i></button>
                                        </div>
                                    </div>
                                </div>
                                <button type="button" id="add-variant-btn"
                                    class="btn btn-sm btn-outline-secondary mt-2">+ Add Size Variant</button>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="imageFile" class="form-label fw-bold">Product Image</label>
                                <div class="mb-2 text-center">
                                    <img id="image-preview" th:src="@{${product.imageUrl != null ? product.imageUrl : ''}}"
                                        class="img-thumbnail"
                                        style="max-height: 250px; width: 100%; object-fit: cover;">
                                    <p id="image-status-label" class="small text-muted mt-1"
                                        th:text="${product.imageUrl != null ? 'Current Image' : 'Apparel Placeholder Image'}">
                                    </p>
                                </div>
                                <input class="form-control" type="file" id="imageFile" name="imageFile"
                                    accept="image/*">
                                <p class="small text-muted mt-1">Select an image file to upload.</p>
                            </div>
                        </div>
                    </div>

                    <hr class="mt-2 mb-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/vendor/products}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn amz-btn-primary px-4">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.getElementById('variants-container');
            const addBtn = document.getElementById('add-variant-btn');
            const basePriceInput = document.getElementById('price');

            // Automatically pre-populate SKU prices when base product price is typed
            basePriceInput.addEventListener('input', function () {
                const basePrice = this.value;
                const variantPriceInputs = container.querySelectorAll('input[name="variantPrices"]');
                variantPriceInputs.forEach(input => {
                    if (!input.value || input.value === '0' || input.value === '') {
                        input.value = basePrice;
                    }
                });
            });

            addBtn.addEventListener('click', function () {
                const currentBasePrice = basePriceInput.value || '';
                const newRow = document.createElement('div');
                newRow.className = 'row g-2 mb-2 variant-row align-items-center';
                newRow.innerHTML = `
                <div class="col-md-4">
                    <input type="text" name="variantSizes" class="form-control" placeholder="Size (e.g. S, M)" required>
                </div>
                <div class="col-md-4">
                    <input type="number" name="variantStocks" class="form-control" placeholder="Stock" required>
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.01" name="variantPrices" value="${currentBasePrice}" class="form-control" placeholder="Price (₹)" required>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-danger remove-variant-btn w-100"><i class="bi bi-trash">Delete</i></button>
                </div>
            `;
                container.appendChild(newRow);
            });

            container.addEventListener('click', function (e) {
                if (e.target.classList.contains('remove-variant-btn') || e.target.closest('.remove-variant-btn')) {
                    const row = e.target.closest('.variant-row');
                    if (container.querySelectorAll('.variant-row').length > 1) {
                        row.remove();
                    } else {
                        alert("A product must have at least one size variant!");
                    }
                }
            });

            // Live Product Photo Upload Preview
            const fileInput = document.getElementById('imageFile');
            const imagePreview = document.getElementById('image-preview');
            const statusLabel = document.getElementById('image-status-label');

            if (fileInput && imagePreview) {
                fileInput.addEventListener('change', function () {
                    const file = this.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            imagePreview.src = e.target.result;
                            if (statusLabel) {
                                statusLabel.textContent = "Selected Photo Preview";
                            }
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
        });
    </script>
</body>

</html>
