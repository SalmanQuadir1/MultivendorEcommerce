<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">Product Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root{--primary:#15803d;--primary-light:rgba(21,128,61,.08);--success:#166534;--dark:#14532d;--border:#e2e8f0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;color:#334155;margin:0}
.dashboard-container{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--dark);color:#fff;padding:24px;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;border-right:1px solid rgba(255,255,255,.05)}
.sidebar-brand{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px;margin-bottom:40px}
.sidebar-brand span{color:#ffe500}
.nav-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;font-weight:700;margin-bottom:15px;padding-left:12px}
.sidebar-nav{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.sidebar-link{display:flex;align-items:center;gap:14px;padding:12px 16px;color:#94a3b8;text-decoration:none;font-weight:600;font-size:14px;border-radius:8px;transition:all .25s}
.sidebar-link:hover,.sidebar-link.active{color:#fff;background:rgba(255,255,255,.08)}
.main-content{margin-left:280px;flex:1;padding:40px;background:#f8fafc;min-height:100vh}
.top-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.glass-card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.02);padding:32px;max-width:900px}
label{font-size:.82rem;font-weight:700;color:#475569;margin-bottom:4px;display:block}
.form-control,.form-select{border-radius:8px;border:1px solid var(--border);padding:10px 14px;font-size:.9rem}
.form-control:focus,.form-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.btn-primary-custom{background:var(--primary);color:#fff;border:none;padding:10px 32px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .3s}
.btn-primary-custom:hover{background:var(--success);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="dashboard-container">
<div th:replace="~{fragments/vendor_sidebar :: sidebar('products')}"></div>
<main class="main-content">
<header class="top-header">
<div><h1 style="font-weight:800;font-size:1.4rem;letter-spacing:-.3px;margin:0;color:#0f172a" th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">Add Product</h1><p class="text-muted small m-0" th:text="${product.id == null ? 'Create a new product with variants and pricing.' : 'Update product details, variants and pricing.'}">Fill in details</p></div>
<a th:href="@{/vendor/products}" class="btn btn-outline-secondary" style="font-size:.85rem;padding:8px 20px;border-radius:8px;font-weight:600"><i class="bi bi-arrow-left me-1"></i> Back</a>
</header>
<div class="glass-card">
<form th:action="@{/vendor/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
<input type="hidden" th:field="*{id}">
<input type="hidden" th:field="*{imageUrl}">
<div class="row g-4">
<div class="col-md-8">
<div class="mb-3"><label>Product Name</label><input type="text" class="form-control" th:field="*{name}" placeholder="Enter product name" required></div>
<div class="mb-3"><label>Description</label><textarea class="form-control" rows="4" th:field="*{description}" placeholder="Describe your product..." required></textarea></div>
<div class="row g-3">
<div class="col-md-6"><label>Price (₹)</label><input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" readonly style="background:#f1f5f9;cursor:not-allowed"><small class="text-muted"><i class="bi bi-info-circle"></i> Auto-filled from first SKU price</small></div>
<div class="col-md-6"><label>Category</label><select class="form-select" name="category.id" required><option value="">Select category</option><option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${product.category != null and product.category.id == cat.id}"></option></select></div>
</div>
</div>
<div class="col-md-4">
<div class="mb-3"><label>Preview</label><div class="border rounded-3 p-3 text-center bg-light"><img id="image-preview" th:src="@{${product.imageUrl != null ? product.imageUrl : ''}}" style="max-height:200px;width:100%;object-fit:cover;border-radius:8px" class="img-fluid"><p id="image-status-label" class="small text-muted mt-2 mb-0" th:text="${product.imageUrl != null ? 'Current image' : 'No image selected'}">No image</p></div></div>
<div><label for="imageFile" class="btn btn-outline-primary w-100 px-4" style="border-radius:8px;font-weight:600;cursor:pointer"><i class="bi bi-cloud-upload me-2"></i>Choose Image</label><input type="file" id="imageFile" name="imageFile" accept="image/*" style="display:none"></div>
</div>
</div>
<hr class="my-4">
<div class="d-flex align-items-center justify-content-between mb-3">
<h5 style="font-weight:700;margin:0;font-size:1rem">SKU Variants</h5>
<button type="button" id="add-variant-btn" class="btn btn-sm btn-outline-success rounded-pill px-3"><i class="bi bi-plus-lg me-1"></i>Add Row</button>
</div>
<div class="table-responsive">
<table class="table table-borderless align-middle mb-0" style="min-width:620px">
<thead><tr style="border-bottom:2px solid #e5e7eb"><th style="width:26%;padding:8px 8px 8px 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8">Size</th><th style="width:16%;padding:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8">Stock</th><th style="width:24%;padding:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8">Unit Cost</th><th style="width:24%;padding:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8">Sell Price</th><th style="width:10%;padding:8px 0 8px 8px"></th></tr></thead>
<tbody id="variants-container">
<tr th:each="variant : ${product.variants}" class="variant-row"><td style="padding:6px 8px 6px 0"><input type="text" name="variantSizes" th:value="${variant.size}" class="form-control form-control-sm" placeholder="e.g. 500g" required></td><td style="padding:6px 8px"><input type="number" name="variantStocks" th:value="${variant.stock}" class="form-control form-control-sm" placeholder="Qty" required></td><td style="padding:6px 8px"><input type="number" step="0.01" name="variantUnitPrices" th:value="${variant.unitPrice}" class="form-control form-control-sm" placeholder="0.00" required></td><td style="padding:6px 8px"><input type="number" step="0.01" name="variantPrices" th:value="${variant.price}" class="form-control form-control-sm" placeholder="0.00" required></td><td style="padding:6px 0 6px 8px;text-align:center"><button type="button" class="btn btn-outline-danger btn-sm remove-variant-btn w-100"><i class="bi bi-trash me-1"></i>Delete</button></td></tr>
<tr th:if="${#lists.isEmpty(product.variants)}" class="variant-row"><td style="padding:6px 8px 6px 0"><input type="text" name="variantSizes" class="form-control form-control-sm" placeholder="e.g. 500g" required></td><td style="padding:6px 8px"><input type="number" name="variantStocks" class="form-control form-control-sm" placeholder="Qty" required></td><td style="padding:6px 8px"><input type="number" step="0.01" name="variantUnitPrices" class="form-control form-control-sm" placeholder="0.00" required></td><td style="padding:6px 8px"><input type="number" step="0.01" name="variantPrices" class="form-control form-control-sm" placeholder="0.00" required></td><td style="padding:6px 0 6px 8px;text-align:center"><button type="button" class="btn btn-outline-danger btn-sm remove-variant-btn w-100"><i class="bi bi-trash me-1"></i>Delete</button></td></tr>
</tbody>
</table>
</div>
<hr class="my-4">
<div class="d-flex justify-content-end gap-2">
<a th:href="@{/vendor/products}" class="btn btn-outline-secondary px-4" style="border-radius:8px;font-weight:600">Cancel</a>
<button type="submit" class="btn btn-primary-custom px-5"><i class="bi bi-check2 me-1"></i> Save Product</button>
</div>
</form>
</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
const container=document.getElementById('variants-container');
const addBtn=document.getElementById('add-variant-btn');
const basePriceInput=document.getElementById('price');
function syncFromFirst(){const p=container.querySelector('input[name="variantPrices"]');if(p&&p.value)basePriceInput.value=p.value}
container.addEventListener('input',function(e){if(e.target&&e.target.name==='variantPrices'){const f=container.querySelector('input[name="variantPrices"]');if(e.target===f)basePriceInput.value=e.target.value}});
addBtn.addEventListener('click',function(){const fS=container.querySelector('input[name="variantPrices"]'),fC=container.querySelector('input[name="variantUnitPrices"]'),cS=fS?fS.value:'',cC=fC?fC.value:'';const t=document.createElement('tr');t.className='variant-row';t.innerHTML='<td style="padding:6px 8px 6px 0"><input type="text" name="variantSizes" class="form-control form-control-sm" placeholder="e.g. 500g" required></td><td style="padding:6px 8px"><input type="number" name="variantStocks" class="form-control form-control-sm" placeholder="Qty" required></td><td style="padding:6px 8px"><input type="number" step="0.01" name="variantUnitPrices" value="'+cC+'" class="form-control form-control-sm" placeholder="0.00" required></td><td style="padding:6px 8px"><input type="number" step="0.01" name="variantPrices" value="'+cS+'" class="form-control form-control-sm" placeholder="0.00" required></td><td style="padding:6px 0 6px 8px;text-align:center"><button type="button" class="btn btn-outline-danger btn-sm remove-variant-btn w-100"><i class="bi bi-trash me-1"></i>Delete</button></td>';container.appendChild(t)});
container.addEventListener('click',function(e){if(e.target.classList.contains('remove-variant-btn')||e.target.closest('.remove-variant-btn')){const r=e.target.closest('.variant-row');if(container.querySelectorAll('.variant-row').length>1){r.remove();setTimeout(syncFromFirst,50)}else alert('A product must have at least one size variant!')}});
const fi=document.getElementById('imageFile'),ip=document.getElementById('image-preview'),sl=document.getElementById('image-status-label');if(fi&&ip){fi.addEventListener('change',function(){const f=this.files[0];if(f){const r=new FileReader();r.onload=function(e){ip.src=e.target.result;if(sl)sl.textContent='Selected Photo Preview'};r.readAsDataURL(f)}})}
syncFromFirst();
});
</script>
</body>
</html>
