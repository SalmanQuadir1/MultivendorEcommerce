<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Profile | OrganicWorld Vendor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #16a34a;
            --dark: #0f172a;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
        }
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background-color: var(--dark);
            color: #fff;
            padding: 24px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-brand {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }
        .sidebar-brand span { color: #ffe500; }
        .sidebar-nav {
            list-style: none; padding: 0; margin: 0;
            display: flex; flex-direction: column; gap: 8px;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 16px; color: #94a3b8; text-decoration: none;
            font-weight: 600; font-size: 14px; border-radius: 8px;
            transition: all 0.25s ease;
        }
        .sidebar-link:hover, .sidebar-link.active {
            color: #fff; background-color: rgba(255, 255, 255, 0.08);
        }
        .main-content {
            margin-left: 280px; flex-grow: 1; padding: 40px; background-color: #f8fafc;
        }
        .glass-card {
            background: #fff; border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            padding: 35px;
        }
        .preview-box {
            width: 150px; height: 150px; border-radius: 50%;
            overflow: hidden; border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .preview-box img {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div th:replace="~{fragments/vendor_sidebar :: sidebar('profile')}"></div>

    <main class="main-content">
        <div class="mb-4">
            <h1 class="fw-bold text-dark">Customize Your Brand Profile</h1>
            <p class="text-muted">Your chosen Logo and Merchant Name will dynamic reflect globally in the main navigation header.</p>
        </div>

        <div th:if="${success}" class="alert alert-success border-0 shadow-sm rounded-3 mb-4" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}">Success</span>
        </div>
        
        <div th:if="${error}" class="alert alert-danger border-0 shadow-sm rounded-3 mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Error</span>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="glass-card">
                    <form th:action="@{/vendor/profile/update}" method="post" enctype="multipart/form-data">
                        <div class="d-flex flex-column align-items-center mb-5 text-center border-bottom pb-4">
                            <div class="preview-box">
                                <img id="imgPreview" th:src="${user.logoUrl != null && !user.logoUrl.isEmpty() ? user.logoUrl : '/images/placeholder-logo.png'}" 
                                     onerror="this.src='https://via.placeholder.com/150?text=No+Logo'" alt="Logo Preview">
                            </div>
                            <h5 class="fw-bold mb-1" th:text="${user.fullName}">Merchant Name</h5>
                            <p class="small text-muted" th:text="${user.email}">merchant@email.com</p>
                            
                            <label for="logoFileInput" class="btn btn-outline-primary btn-sm rounded-pill px-3 mt-2">
                                <i class="bi bi-camera me-1"></i> Upload New Logo
                            </label>
                            <input type="file" id="logoFileInput" name="logoFile" class="d-none" accept="image/*" onchange="previewImage(event)">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Merchant Business Name</label>
                            <input type="text" class="form-control form-control-lg border-2 rounded-3" 
                                   name="fullName" th:value="${user.fullName}" required placeholder="e.g., Royal Nuts Store">
                            <div class="form-text text-muted small">This name replaces the default storefront logo when you are viewing the shop.</div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-success btn-lg py-3 rounded-3 fw-bold">
                                <i class="bi bi-save me-2"></i> Save & Publish Brand Update
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('imgPreview');
            output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
</body>
</html>
