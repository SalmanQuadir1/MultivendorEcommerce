<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Profit & Loss | OrganicWorld</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root{--primary:#15803d;--primary-light:rgba(21,128,61,.08);--success:#166534;--danger:#ef4444;--dark:#14532d;--border:#e2e8f0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;color:#334155;margin:0;overflow-x:hidden}
.dashboard-container{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--dark);color:#fff;padding:24px;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;border-right:1px solid rgba(255,255,255,.05)}
.sidebar-brand{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px;margin-bottom:40px}
.sidebar-brand span{color:#ffe500}
.nav-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;font-weight:700;margin-bottom:15px;padding-left:12px}
.sidebar-nav{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.sidebar-link{display:flex;align-items:center;gap:14px;padding:12px 16px;color:#94a3b8;text-decoration:none;font-weight:600;font-size:14px;border-radius:8px;transition:all .25s}
.sidebar-link:hover,.sidebar-link.active{color:#fff;background:rgba(255,255,255,.08)}
.main-content{margin-left:280px;flex:1;padding:40px;background:#f8fafc;min-height:100vh}
.top-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.glass-card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.02);padding:24px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.metric{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:space-between;transition:all .3s}
.metric:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.04)}
.metric .label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8}
.metric .value{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.metric .icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0 6px}
table th{color:#64748b;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border:none;white-space:nowrap}
table td{padding:12px 14px;background:#fff;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
table td:first-child{border-left:1px solid var(--border);border-radius:8px 0 0 8px}
table td:last-child{border-right:1px solid var(--border);border-radius:0 8px 8px 0}
table tr:hover td{background:#fafbfc}
.profit{color:#059669;font-weight:700}
.loss{color:#dc2626;font-weight:700}
.badge-sku{padding:3px 8px;border-radius:4px;background:#f1f5f9;color:#475569;font-size:10px;font-weight:600}
.empty{text-align:center;padding:48px 20px;color:#94a3b8}
.empty i{font-size:2rem;margin-bottom:10px;opacity:.3}
@media(max-width:992px){.metrics{grid-template-columns:repeat(2,1fr)}}
@media print{.sidebar,.top-header form,.btn{display:none!important}.main-content{margin-left:0!important;padding:0!important}.glass-card{border:none!important;box-shadow:none!important}}
</style>
</head>
<body>
<div class="dashboard-container">
<div th:replace="~{fragments/vendor_sidebar :: sidebar('reports')}"></div>
<main class="main-content">
<header class="top-header">
<div><h1 style="font-weight:800;font-size:1.4rem;letter-spacing:-.3px;margin:0;color:#0f172a">Profit & Loss</h1><p class="text-muted small m-0">Review margins, revenue, and cost of goods sold.</p></div>
<div class="d-flex gap-2">
<button class="btn btn-outline-success" style="font-size:.82rem;padding:8px 16px;border-radius:8px;font-weight:700" onclick="exportCSV()"><i class="bi bi-download me-1"></i>CSV</button>
<button class="btn btn-outline-secondary" style="font-size:.82rem;padding:8px 16px;border-radius:8px;font-weight:700" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
</div>
</header>
<div class="glass-card mb-4" style="padding:20px">
<form th:action="@{/vendor/reports/pl}" method="get" class="row g-3 align-items-end">
<div class="col-md-3"><label class="form-label fw-bold text-secondary small">Start Date</label><input type="date" name="startDate" class="form-control form-control-sm" th:value="${startDate}"></div>
<div class="col-md-3"><label class="form-label fw-bold text-secondary small">End Date</label><input type="date" name="endDate" class="form-control form-control-sm" th:value="${endDate}"></div>
<div class="col-md-4"><label class="form-label fw-bold text-secondary small">Search</label><input type="text" name="search" class="form-control form-control-sm" placeholder="Product or SKU..." th:value="${search}"></div>
<div class="col-md-2 d-flex gap-2"><button type="submit" class="btn btn-success btn-sm fw-bold w-100" style="border-radius:8px"><i class="bi bi-funnel me-1"></i>Filter</button><a th:href="@{/vendor/reports/pl}" class="btn btn-outline-secondary btn-sm" style="border-radius:8px"><i class="bi bi-arrow-counterclockwise"></i></a></div>
</form>
</div>
<div class="metrics">
<div class="metric"><div><div class="label">Revenue</div><div class="value" style="color:#0f172a" th:text="'₹' + ${totalRevenue}">₹0</div></div><div class="icon" style="background:rgba(21,128,61,.1);color:var(--primary)"><i class="bi bi-cash-stack"></i></div></div>
<div class="metric"><div><div class="label">COGS</div><div class="value" style="color:#64748b" th:text="'₹' + ${totalCOGS}">₹0</div></div><div class="icon" style="background:rgba(239,68,68,.1);color:#dc2626"><i class="bi bi-box-seam"></i></div></div>
<div class="metric"><div><div class="label">Gross Profit</div><div class="value" style="color:#059669" th:text="'₹' + ${grossProfit}">₹0</div></div><div class="icon" style="background:rgba(5,150,105,.1);color:#059669"><i class="bi bi-graph-up-arrow"></i></div></div>
<div class="metric"><div><div class="label">Margin</div><div class="value" style="color:#0284c7" th:text="${netProfitMargin} + '%'">0%</div></div><div class="icon" style="background:rgba(2,132,199,.1);color:#0284c7"><i class="bi bi-percent"></i></div></div>
</div>
<div class="glass-card" style="padding:0">
<div class="table-wrap">
<table>
<thead><tr><th>Date</th><th>Product</th><th>SKU</th><th class="text-center">Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Revenue</th><th style="text-align:right">Unit Cost</th><th style="text-align:right">COGS</th><th style="text-align:right">Profit</th></tr></thead>
<tbody>
<tr th:each="item : ${plItems}">
<td style="color:#94a3b8;font-size:12px" th:text="${#temporals.format(item.timestamp, 'dd MMM yy')}">Date</td>
<td><div class="fw-bold" style="color:#0f172a;font-size:13px" th:text="${item.productName}">Product</div></td>
<td><span class="badge-sku" th:text="${item.sku}">SKU</span></td>
<td class="text-center fw-bold" th:text="${item.quantity}">0</td>
<td style="text-align:right">₹<span th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}">0</span></td>
<td style="text-align:right;font-weight:600" th:text="'₹' + ${#numbers.formatDecimal(item.revenue, 1, 'COMMA', 2, 'POINT')}">₹0</td>
<td style="text-align:right;color:#94a3b8" th:text="'₹' + ${#numbers.formatDecimal(item.unitCost, 1, 'COMMA', 2, 'POINT')}">₹0</td>
<td style="text-align:right;color:#94a3b8" th:text="'₹' + ${#numbers.formatDecimal(item.cogs, 1, 'COMMA', 2, 'POINT')}">₹0</td>
<td style="text-align:right"><span th:class="${item.profit >= 0} ? 'profit' : 'loss'" th:text="'₹' + ${#numbers.formatDecimal(item.profit, 1, 'COMMA', 2, 'POINT')}">₹0</span></td>
</tr>
<tr th:if="${#lists.isEmpty(plItems)}">
<td colspan="9"><div class="empty"><i class="bi bi-bar-chart"></i><h5 style="color:#64748b;font-weight:600">No data</h5><p style="font-size:.85rem">No transactions match the filters.</p></div></td>
</tr>
</tbody>
</table>
</div>
</div>
<div class="mt-3" th:if="${#lists.isEmpty(plItems)}" th:replace="~{fragments/pagination :: pagination(pagedData=${plItems}, baseUrl='/vendor/reports/pl', pageParam='page', sizeParam='size')}"></div>
</main>
</div>
<script>
function exportCSV(){const t=document.querySelector('table');if(!t)return;let c="data:text/csv;charset=utf-8,";t.querySelectorAll('tr').forEach(r=>{const d=Array.from(r.querySelectorAll('th,td')).map(c=>'"'+c.textContent.trim().replace(/"/g,'""')+'"').join(",");c+=d+"\r\n"});const a=document.createElement("a");a.setAttribute("href",encodeURI(c));a.setAttribute("download","profit_loss.csv");document.body.appendChild(a);a.click();document.body.removeChild(a)}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
