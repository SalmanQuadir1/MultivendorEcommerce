<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Purchase Order - Vendor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/">E-COMMERCE <span class="text-muted fs-6">Vendor</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <span class="nav-link text-muted me-3">Welcome, <span th:text="${#authentication.principal.username}">Vendor</span></span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn amz-btn-secondary btn-sm px-4">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="vendor-layout">
    <!-- Sidebar -->
    <div class="vendor-sidebar">
        <div class="nav flex-column">
            <a class="nav-link" th:href="@{/vendor/dashboard}">
                <i class="fas fa-home me-2"></i> Dashboard
            </a>
            <a class="nav-link" th:href="@{/vendor/products}">
                <i class="fas fa-box me-2"></i> Products
            </a>
            <a class="nav-link active" th:href="@{/vendor/inventory}">
                <i class="fas fa-warehouse me-2"></i> Inventory
            </a>
            <a class="nav-link" th:href="@{/vendor/orders}">
                <i class="fas fa-shopping-bag me-2"></i> Orders
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="vendor-content">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/vendor/inventory}" class="amz-link">Inventory</a></li>
                <li class="breadcrumb-item"><a th:href="@{/vendor/inventory/purchase-orders}" class="amz-link">Purchase Orders</a></li>
                <li class="breadcrumb-item active" aria-current="page">New Purchase Order</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <h2 class="mb-0 fw-bold">Create Purchase Order</h2>
            <a th:href="@{/vendor/inventory/purchase-orders}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back to List</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/vendor/inventory/purchase-orders/save}" method="post">
                    <div class="mb-4 col-md-6">
                        <label for="supplierName" class="form-label fw-bold">Supplier / Manufacturer Name</label>
                        <input type="text" class="form-control" id="supplierName" name="supplierName" placeholder="Enter supplier name" required>
                    </div>

                    <h5 class="fw-bold mb-3 mt-4">Order Items</h5>
                    <div id="items-container">
                        <!-- Dynamic rows will go here -->
                        <div class="row g-2 mb-2 item-row align-items-center">
                            <div class="col-md-5">
                                <label class="form-label small text-muted d-none d-md-block">Select SKU / Size</label>
                                <select name="variantIds" class="form-select" required>
                                    <option value="">Choose a Size SKU</option>
                                    <option th:each="v : ${variants}" 
                                            th:value="${v.id}" 
                                            th:text="${v.product.name} + ' - Size: ' + ${v.size} + ' (SKU: ' + ${v.sku} + ')'"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted d-none d-md-block">Quantity</label>
                                <input type="number" name="quantities" class="form-control" placeholder="Quantity" min="1" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted d-none d-md-block">Unit Cost (₹)</label>
                                <input type="number" step="0.01" name="unitCosts" class="form-control" placeholder="Unit Cost" required>
                            </div>
                            <div class="col-md-1">
                                <label class="form-label small text-muted d-none d-md-block">&nbsp;</label>
                                <button type="button" class="btn btn-outline-danger remove-item-btn w-100"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="add-item-btn" class="btn btn-sm btn-outline-secondary mt-2"><i class="fas fa-plus me-1"></i>Add Another Item</button>

                    <hr class="mt-4 mb-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/vendor/inventory/purchase-orders}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn amz-btn-primary px-4">Save PO as Pending</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('items-container');
        const addBtn = document.getElementById('add-item-btn');

        addBtn.addEventListener('click', function() {
            const newRow = document.createElement('div');
            newRow.className = 'row g-2 mb-2 item-row align-items-center';
            
            const firstSelect = container.querySelector('select[name="variantIds"]');
            const optionsHtml = firstSelect ? firstSelect.innerHTML : '<option value="">Choose a Size SKU</option>';

            newRow.innerHTML = `
                <div class="col-md-5">
                    <select name="variantIds" class="form-select" required>
                        ${optionsHtml}
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" name="quantities" class="form-control" placeholder="Quantity" min="1" required>
                </div>
                <div class="col-md-3">
                    <input type="number" step="0.01" name="unitCosts" class="form-control" placeholder="Unit Cost" required>
                </div>
                <div class="col-md-1">
                    <button type="button" class="btn btn-outline-danger remove-item-btn w-100"><i class="fas fa-trash"></i></button>
                </div>
            `;
            container.appendChild(newRow);
        });

        container.addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-item-btn') || e.target.closest('.remove-item-btn')) {
                const row = e.target.closest('.item-row');
                if (container.querySelectorAll('.item-row').length > 1) {
                    row.remove();
                } else {
                    alert("A purchase order must contain at least one item!");
                }
            }
        });
    });
</script>
</body>
</html>
