<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Manage Inventory | OrganicWorld</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root{--primary:#15803d;--primary-light:rgba(21,128,61,0.08);--success:#166534;--danger:#ef4444;--dark:#14532d;--border:#e2e8f0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;color:#334155;margin:0;overflow-x:hidden}
.dashboard-container{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--dark);color:#fff;padding:24px;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;border-right:1px solid rgba(255,255,255,.05)}
.sidebar-brand{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px;margin-bottom:40px}
.sidebar-brand span{color:#ffe500}
.nav-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;font-weight:700;margin-bottom:15px;padding-left:12px}
.sidebar-nav{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.sidebar-link{display:flex;align-items:center;gap:14px;padding:12px 16px;color:#94a3b8;text-decoration:none;font-weight:600;font-size:14px;border-radius:8px;transition:all .25s}
.sidebar-link:hover,.sidebar-link.active{color:#fff;background:rgba(255,255,255,.08)}
.main-content{margin-left:280px;flex:1;padding:40px;background:#f8fafc;min-height:100vh}
.top-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:35px;flex-wrap:wrap;gap:12px}
.top-header .btn{font-size:.82rem;padding:8px 16px;border-radius:10px;font-weight:700}
.glass-card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.02)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0 8px}
table th{color:#64748b;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:12px 16px;border:none;white-space:nowrap}
table td{padding:14px 16px;background:#fff;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
table td:first-child{border-left:1px solid var(--border);border-radius:10px 0 0 10px}
table td:last-child{border-right:1px solid var(--border);border-radius:0 10px 10px 0}
table tr:hover td{background:#fafbfc}
.badge-cat{padding:4px 10px;border-radius:20px;font-weight:600;font-size:10px;background:var(--primary-light);color:var(--primary);text-transform:uppercase;letter-spacing:.3px}
.badge-stock{padding:4px 10px;border-radius:20px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.3px;display:inline-block}
.badge-stock.ok{background:rgba(22,101,52,.1);color:#166534}
.badge-stock.low{background:rgba(239,68,68,.1);color:#dc2626}
.prod-cell{display:flex;align-items:center;gap:12px}
.prod-cell img{width:40px;height:40px;object-fit:contain;border-radius:8px;border:1px solid var(--border);background:#f8fafc}
.prod-cell .name{font-weight:600;color:#0f172a;font-size:13px}
.prod-cell .meta{color:#94a3b8;font-size:11px;margin-top:2px}
.price-cell{font-weight:600;color:#0f172a;font-size:13px}
.price-cell .cost{color:#94a3b8;font-weight:400;font-size:12px}
.edit-form{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.edit-form .inp{width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;text-align:center;font-size:12px;font-weight:600;background:#f8fafc;outline:none;transition:all .2s}
.edit-form .inp:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 2px var(--primary-light)}
.edit-form .inp-sm{width:56px}
.edit-form .btn-save{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;transition:all .2s}
.edit-form .btn-save:hover{background:var(--success);transform:scale(1.05)}
.empty-state{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-state i{font-size:2.5rem;margin-bottom:12px;opacity:.3}
</style>
</head>
<body>
<div class="dashboard-container">
<div th:replace="~{fragments/vendor_sidebar :: sidebar('inventory')}"></div>
<main class="main-content">
<header class="top-header">
<div><h1 style="font-weight:800;font-size:1.4rem;letter-spacing:-.3px;margin:0;color:#0f172a">Inventory</h1><p class="text-muted small m-0">Manage stock, costs, and pricing across all variants.</p></div>
<div class="d-flex gap-2">
<a th:href="@{/vendor/inventory/low-stock}" class="btn btn-outline-warning"><i class="bi bi-exclamation-triangle me-1"></i>Low Stock</a>
<a th:href="@{/vendor/inventory/history}" class="btn btn-outline-info"><i class="bi bi-clock-history me-1"></i>History</a>
<a th:href="@{/vendor/inventory/purchase-orders}" class="btn btn-outline-success"><i class="bi bi-file-earmark me-1"></i>POs</a>
</div>
</header>
<div class="glass-card p-4">
<div class="table-wrap">
<table>
<thead><tr><th>Product / SKU</th><th>Unit Cost</th><th>Selling Price</th><th class="text-center">Stock</th><th style="min-width:290px">Quick Edit</th></tr></thead>
<tbody>
<tr th:each="v : ${variants}">
<td><div class="prod-cell"><img th:src="@{${v.product.imageUrl != null ? v.product.imageUrl : '/images/placeholder.png'}}" alt=""><div><div class="name" th:text="${v.product.name}">Product</div><div class="meta"><span class="badge-cat" th:text="${v.product.category != null ? v.product.category.name : 'General'}">Cat</span> · <span th:text="'Size: ' + ${v.size}">M</span> · <span th:text="'SKU: ' + ${v.sku}">SKU</span></div></div></div></td>
<td><div class="price-cell"><span>₹<span th:text="${v.unitPrice}">0</span></span></div></td>
<td><div class="price-cell"><span>₹<span th:text="${v.price}">0</span></span></div></td>
<td class="text-center"><span th:class="'badge-stock ' + (${v.stock <= 10} ? 'low' : 'ok')" th:text="${v.stock + ' left'}">10 left</span></td>
<td>
<form th:action="@{/vendor/inventory/update/{id}(id=${v.id})}" method="post" class="edit-form">
<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><span style="font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px">Cost</span><input type="number" step="0.01" name="unitPrice" class="inp" th:value="${v.unitPrice}" required></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><span style="font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px">Sell</span><input type="number" step="0.01" name="price" class="inp" th:value="${v.price}" required></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><span style="font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px">Stock</span><input type="number" name="stock" class="inp inp-sm" th:value="${v.stock}" required></div>
<button type="submit" class="btn-save" title="Save"><i class="bi bi-check-lg"></i></button>
</form>
</td>
</tr>
<tr th:if="${#lists.isEmpty(variants)}">
<td colspan="5"><div class="empty-state"><i class="bi bi-box-seam"></i><h5 style="color:#64748b;font-weight:600">No inventory items</h5><p style="font-size:.85rem">Add products first to see them here.</p></div></td>
</tr>
</tbody>
</table>
</div>
</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
