<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #15803d; --primary-light: rgba(21, 128, 61, 0.08); --success: #166534; --danger: #ef4444; --dark: #14532d; --border-color: #e2e8f0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #334155; margin: 0; overflow-x: hidden; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--dark); color: #fff; padding: 24px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-brand { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .sidebar-brand span { color: #ffe500; }
        .nav-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; font-weight: 700; margin-bottom: 15px; padding-left: 12px; }
        .sidebar-nav { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-link { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; border-radius: 8px; transition: all 0.25s ease; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.08); }
        .main-content { margin-left: 280px; flex: 1; padding: 40px; background: #f8fafc; min-height: 100vh; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .glass-card { background: #fff; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.02); padding: 24px; }
        .table-modern { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .table-modern th { color: #64748b; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; border: none; padding: 12px 20px; }
        .table-modern tbody tr { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.01); transition: all 0.25s ease; }
        .table-modern tbody tr:hover { transform: scale(1.005); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .table-modern td { padding: 18px 20px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; }
        .table-modern td:first-child { border-left: 1px solid var(--border-color); border-radius: 12px 0 0 12px; }
        .table-modern td:last-child { border-right: 1px solid var(--border-color); border-radius: 0 12px 12px 0; }
        .modern-badge { padding: 6px 12px; border-radius: 30px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; }
        .badge-primary { background: var(--primary-light); color: var(--primary); }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div th:replace="~{fragments/vendor_sidebar :: sidebar('categories')}"></div>
    <main class="main-content">
        <header class="top-header">
            <div>
                <h1 class="fw-extrabold text-dark m-0 fs-3" style="font-weight:800;letter-spacing:-0.5px">Categories</h1>
                <p class="text-muted small m-0">Create and manage product categories.</p>
            </div>
        </header>
        <div th:if="${success}" class="alert alert-success border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 mb-4 py-3"><i class="bi bi-check-circle-fill fs-5"></i> <span th:text="${success}">Success</span></div>
        <div th:if="${error}" class="alert alert-danger border-0 shadow-sm rounded-3 d-flex align-items-center gap-2 mb-4 py-3"><i class="bi bi-exclamation-triangle-fill fs-5"></i> <span th:text="${error}">Error</span></div>
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card">
                    <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle text-success me-2"></i>Add Category</h5>
                    <form th:action="@{/vendor/categories/save}" th:object="${newCategory}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary small">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Dry Fruits" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary small">Description</label>
                            <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Brief description"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-3"><i class="bi bi-check2 me-1"></i> Save</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <h5 class="fw-bold mb-4"><i class="bi bi-tags text-success me-2"></i>All Categories</h5>
                    <div class="table-responsive">
                        <table class="table-modern">
                            <thead>
                                <tr><th>Name</th><th>Description</th><th class="text-end">Actions</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="cat : ${categories}">
                                    <td><span class="modern-badge badge-primary" th:text="${cat.name}">Name</span></td>
                                    <td style="color:#64748b" th:text="${cat.description != null ? cat.description : '—'}">Desc</td>
                                    <td class="text-end">
                                        <a th:href="@{'/vendor/categories/delete/' + ${cat.id}}" class="btn btn-outline-danger btn-sm px-3 rounded-3" onclick="return confirm('Delete this category?')"><i class="bi bi-trash3"></i></a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(categories)}">
                                    <td colspan="3" class="text-center py-5 text-muted">
                                        <i class="bi bi-tag fs-2 d-block mb-2"></i>No categories yet. Create one to get started.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
