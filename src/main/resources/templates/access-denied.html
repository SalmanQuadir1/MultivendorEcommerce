<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .access-denied-container {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 500px;
            border: 1px solid #eaeaec;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .shield-icon-wrapper {
            width: 90px;
            height: 90px;
            background-color: rgba(239, 68, 68, 0.08);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            font-size: 42px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container access-denied-container my-5">
    <div class="error-card p-5 text-center w-100">
        <div class="shield-icon-wrapper">
            <i class="bi bi-shield-slash"></i>
        </div>
        <h3 class="fw-bold text-dark mb-3">ACCESS DENIED</h3>
        <p class="text-muted mb-4 lead" style="font-size: 15px; line-height: 1.6;">
            Sorry! You do not have permission to access this page. Please make sure you are logged into an account with appropriate administrative or vendor privileges.
        </p>
        <div class="d-flex flex-column gap-2">
            <a th:href="@{/}" class="btn amz-btn-primary py-3 rounded-2 fw-bold w-100">GO TO HOME</a>
            <a th:href="@{/login}" class="btn btn-outline-secondary py-3 rounded-2 fw-semibold w-100" style="color: #282c3f; border-color: #d4d5d9;">LOGIN WITH DIFFERENT ACCOUNT</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
