<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saved Addresses | OrganicWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .address-grid-container {
            min-height: 65vh;
        }
        .address-card {
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: #fff;
        }
        .address-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-color: #15803d;
        }
    </style>
</head>
<body style="background-color: #f8fafc;">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5 address-grid-container">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <div>
            <h3 class="fw-bold text-dark mb-1"><i class="bi bi-geo-alt-fill text-success"></i> Saved Addresses</h3>
            <p class="text-muted small mb-0">Manage your delivery addresses for seamless checkout experiences.</p>
        </div>
        <button type="button" class="btn amz-btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addAddressModal">
            <i class="bi bi-plus-lg me-1"></i> Add Address
        </button>
    </div>

    <!-- Notifications -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3 mb-4 small py-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}">Success message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm rounded-3 mb-4 small py-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Error message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Address Cards -->
    <div class="row g-4">
        <div class="col-md-6" th:each="addr : ${addresses}">
            <div class="card p-4 address-card h-100 position-relative">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <span class="badge bg-secondary small rounded-pill py-1 px-3">Home / Office</span>
                    <form th:action="@{'/customer/addresses/delete/' + ${addr.id}}" method="post">
                        <button type="submit" class="btn btn-link text-danger p-0 border-0" onclick="return confirm('Are you sure you want to delete this address?');">
                            <i class="bi bi-trash3-fill fs-5"></i>
                        </button>
                    </form>
                </div>
                <h5 class="fw-bold mb-1" th:text="${addr.fullName}">Recipient Name</h5>
                <p class="text-muted mb-2 small" th:text="${addr.streetAddress}">123 Street Address</p>
                <p class="text-muted mb-3 small" th:text="${addr.city} + ', ' + ${addr.state} + ' - ' + ${addr.pinCode}">City, State - Pin</p>
                <div class="border-top pt-2 mt-auto d-flex align-items-center text-muted small">
                    <i class="bi bi-telephone-fill me-2 text-success"></i> <span th:text="${addr.contactNumber}">9999999999</span>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="col-12 text-center py-5 my-3" th:if="${addresses.empty}">
            <div class="mb-4">
                <i class="bi bi-geo-alt text-muted" style="font-size: 64px;"></i>
            </div>
            <h5 class="fw-bold text-dark">No Addresses Found</h5>
            <p class="text-muted small">Please add a delivery address to complete your profile.</p>
            <button type="button" class="btn amz-btn-primary rounded-pill px-4 mt-2" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                Add Your First Address
            </button>
        </div>
    </div>
</div>

<!-- Add Address Modal -->
<div class="modal fade" id="addAddressModal" tabindex="-1" aria-labelledby="addAddressModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
            <div class="modal-header border-bottom pb-2">
                <h5 class="modal-title fw-bold text-success" id="addAddressModalLabel"><i class="bi bi-geo-alt-fill"></i> Add Delivery Address</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/customer/addresses/add}" method="POST">
                <div class="modal-body py-3">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Recipient Full Name</label>
                        <input type="text" class="form-control" name="fullName" required placeholder="Name of recipient (e.g. John Doe)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Street Address</label>
                        <input type="text" class="form-control" name="streetAddress" required placeholder="Flat, House no., Apartment, Street">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold">City</label>
                            <input type="text" class="form-control" name="city" required placeholder="New Delhi">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">State</label>
                            <input type="text" class="form-control" name="state" required placeholder="Delhi">
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold">Pin Code</label>
                            <input type="text" class="form-control" name="pinCode" required placeholder="110001">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">Contact Number</label>
                            <input type="text" class="form-control" name="contactNumber" required placeholder="10-digit number">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top pt-2">
                    <button type="button" class="btn btn-secondary rounded-pill px-4 btn-sm fw-bold" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success rounded-pill px-4 btn-sm fw-bold">Save Address</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
