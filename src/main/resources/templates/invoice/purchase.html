<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Purchase Invoice #<span th:text="${invNo}">INV-001</span></title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f3f4f6;padding:40px;color:#1f2937}
.invoice{max-width:800px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);overflow:hidden}
.invoice-header{background:#14532d;color:#fff;padding:40px;display:flex;justify-content:space-between;align-items:flex-start}
.invoice-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.5px;margin:0}
.invoice-header h1 span{color:#c9a96e}
.invoice-header .inv-meta{text-align:right}
.invoice-header .inv-meta .label{font-size:.75rem;opacity:.6;text-transform:uppercase;letter-spacing:1px}
.invoice-header .inv-meta .value{font-size:1.1rem;font-weight:700}
.invoice-body{padding:40px}
.row-2{display:flex;gap:40px;margin-bottom:32px}
.col-2{flex:1}
.col-2 h6{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;font-weight:700;margin-bottom:8px}
.col-2 p{font-size:.9rem;line-height:1.6;margin:0}
table{width:100%;border-collapse:collapse;margin-bottom:24px}
table th{text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;font-weight:700;padding:12px 0;border-bottom:2px solid #e5e7eb}
table td{padding:14px 0;border-bottom:1px solid #f3f4f6;font-size:.9rem}
table td:last-child,table th:last-child{text-align:right}
table td:nth-child(2),table th:nth-child(2){text-align:center}
table tfoot td{border-bottom:none;padding:8px 0;font-size:.9rem}
table tfoot td:last-child{font-weight:600}
table tfoot .grand td{font-size:1.1rem;font-weight:800;color:#14532d;padding-top:16px;border-top:2px solid #14532d}
.invoice-footer{padding:0 40px 40px;display:flex;justify-content:space-between;align-items:center;color:#9ca3af;font-size:.8rem}
.print-btn{display:block;width:fit-content;margin:20px auto 0;padding:12px 32px;background:#14532d;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .3s}
.print-btn:hover{background:#166534}
@media print{body{background:#fff;padding:0}.print-btn{display:none}.invoice{box-shadow:none;border-radius:0}}
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()"><i class="bi bi-printer"></i> Print / Save PDF</button>
<div class="invoice">
<div class="invoice-header">
<div><h1>Organic<span>World</span></h1><p style="opacity:.7;font-size:.85rem;margin-top:4px">Purchase Order Invoice</p></div>
<div class="inv-meta"><div class="label">Invoice #</div><div class="value" th:text="${invNo}">INV-001</div><div class="label" style="margin-top:8px">Date</div><div class="value" style="font-size:.95rem" th:text="${date}">01 Jan 2026</div></div>
</div>
<div class="invoice-body">
<div class="row-2">
<div class="col-2"><h6>Supplier</h6><p><strong th:text="${po.supplierName}">Supplier Name</strong><br><span th:text="'PO #: ' + ${po.poNumber}">PO-001</span></p></div>
<div class="col-2"><h6>Status</h6><p><strong th:text="${po.status}">COMPLETED</strong></p></div>
</div>
<table>
<thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Unit Cost</th><th style="text-align:right">Total</th></tr></thead>
<tbody>
<tr th:each="item : ${po.items}">
<td><strong th:text="${item.variant.product.name}">Product</strong><br><small style="color:#9ca3af" th:text="'SKU: ' + ${item.variant.sku} + ' | Size: ' + ${item.variant.size}">SKU</small></td>
<td style="text-align:center" th:text="${item.quantity}">1</td>
<td style="text-align:right">₹<span th:text="${#numbers.formatDecimal(item.unitCost, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
<td style="text-align:right">₹<span th:text="${#numbers.formatDecimal(item.unitCost * item.quantity, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
</tr>
</tbody>
<tfoot>
<tr class="grand"><td colspan="3" style="text-align:right;font-weight:800">Total Amount</td><td style="text-align:right;font-weight:800">₹<span th:text="${#numbers.formatDecimal(po.totalAmount, 1, 'COMMA', 2, 'POINT')}">0.00</span></td></tr>
</tfoot>
</table>
</div>
<div class="invoice-footer">
<span>© 2026 OrganicWorld — Vendor Purchase Invoice</span>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
